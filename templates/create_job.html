<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Create Job | CampusHire AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg bg-white shadow-sm">

<div class="container">

<a class="navbar-brand fw-bold text-primary"
href="/">

🤖 CampusHire AI

</a>

<div>

<a href="/recruiter_dashboard"
class="btn btn-outline-primary">

<i class="bi bi-speedometer2"></i>

Dashboard

</a>

</div>

</div>

</nav>

<div class="container py-5">

{% include "partials/flash_messages.html" %}

<div class="row justify-content-center">

<div class="col-lg-9">

<div class="card border-0 shadow-lg rounded-4">

<div class="card-body p-5">

<div class="text-center mb-5">

<div class="display-2">

💼

</div>

<h2 class="fw-bold">

Create New Job

</h2>

<p class="text-muted">

Fill in the details below to publish a new opportunity.

</p>

</div>

<form
action="/create_job"
method="POST">

<div class="row">

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">

<i class="bi bi-briefcase-fill text-primary"></i>

Job Title

</label>

<input

type="text"

name="title"

class="form-control form-control-lg"

placeholder="Software Engineer"

required>

</div>

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">

<i class="bi bi-building text-primary"></i>

Company Name

</label>

<input

type="text"

name="company"

class="form-control form-control-lg"

placeholder="Google"

required>

</div>

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">

<i class="bi bi-geo-alt-fill text-primary"></i>

Location

</label>

<input

type="text"

name="location"

class="form-control form-control-lg"

placeholder="Bangalore"

>

</div>

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">

<i class="bi bi-currency-rupee text-primary"></i>

Salary (Optional)

</label>

<input

type="text"

name="salary"

class="form-control form-control-lg"

placeholder="8 - 12 LPA">

</div>

<div class="col-12">

<label class="form-label fw-semibold">

<i class="bi bi-card-text text-primary"></i>

Job Description

</label>

<textarea

name="description"

rows="8"

class="form-control"

placeholder="Write a detailed job description, responsibilities, qualifications, required skills, salary details and benefits..."

required>

</textarea>

</div>

</div>

<hr class="my-4">

<!-- ================= Extra Information ================= -->

<div class="row">

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">

<i class="bi bi-tools text-primary"></i>

Required Skills

</label>

<input

type="text"

name="required_skills"

class="form-control"

placeholder="Python, SQL, Machine Learning">

</div>

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">

<i class="bi bi-graph-up-arrow text-primary"></i>

Experience Level

</label>

<select

name="experience"

class="form-select">

<option>

Fresher

</option>

<option>

0-2 Years

</option>

<option>

2-5 Years

</option>

<option>

5+ Years

</option>

</select>

</div>

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">

<i class="bi bi-clock-history text-primary"></i>

Employment Type

</label>

<select

name="employment_type"

class="form-select">

<option>

Full Time

</option>

<option>

Internship

</option>

<option>

Part Time

</option>

<option>

Remote

</option>

</select>

</div>

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">

<i class="bi bi-calendar-check text-primary"></i>

Application Deadline

</label>

<input

type="date"

name="deadline"

class="form-control">

</div>

<hr class="my-4">

<div class="d-flex justify-content-between">

<a

href="/recruiter_dashboard"

class="btn btn-outline-secondary btn-lg">

<i class="bi bi-arrow-left-circle"></i>

Back to Dashboard

</a>

<button

type="submit"

class="btn btn-primary btn-lg px-5">

<i class="bi bi-send-fill"></i>

Publish Job

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<footer class="text-center mt-5 mb-3 text-muted">

<hr>

<p>

© 2026 <strong>CampusHire AI</strong>

<br>

AI Powered Campus Placement Portal

</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
